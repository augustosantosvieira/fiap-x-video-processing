name: CI/CD FIAP X Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Instalar Dependências e Testar API
      run: |
        cd api
        pip install -r requirements.txt pytest httpx
        pytest tests/
