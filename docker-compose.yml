version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fiap_postgres
    environment:
      POSTGRES_USER: fiap_user
      POSTGRES_PASSWORD: fiap_password
      POSTGRES_DB: video_processing_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: fiap_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always

  minio:
    image: minio/minio
    container_name: fiap_minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: always

  api:
    build: ./api
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - rabbitmq
      - minio

  worker:
    build: ./worker
    depends_on:
      - rabbitmq
      - postgres
      - minio
    deploy:
      replicas: 2

  notification:
    build: ./notification
    depends_on:
      - rabbitmq

volumes:
  postgres_data:
  minio_data:
